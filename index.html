<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心動小鎮書房</title>
    <!-- 引入美化工具 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入閱讀 PDF 的核心工具 PDF.js (Library) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #F8F0E5;
            background-image: radial-gradient(#EADBC8 2px, transparent 2px);
            background-size: 30px 30px;
        }

        .cute-card {
            background-color: #FFFFFF;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(218, 192, 163, 0.5);
            border: 4px solid #DAC0A3;
        }

        .cute-btn {
            background-color: #EADBC8;
            color: #8C6A5D;
            border: 3px solid #DAC0A3;
            border-radius: 20px;
            font-weight: 900;
            transition: all 0.2s ease;
        }

        .cute-btn:hover {
            background-color: #DAC0A3;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(140, 106, 93, 0.3);
        }

        .book-item {
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .book-item:hover {
            background-color: #F8F0E5;
            border-radius: 15px;
            transform: translateX(5px);
        }

        .book-item.active {
            background-color: #DAC0A3;
            color: white;
            border-radius: 15px;
            border: 2px solid #8C6A5D;
        }

        /* 側邊欄過渡 */
        #sidebar {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sidebar.collapsed {
            width: 0 !important;
            min-width: 0 !important;
            max-width: 0 !important;
            padding: 0 !important;
            margin: 0 !important;
            border: none !important;
            opacity: 0;
            overflow: hidden;
        }

        /* 縮圖選單優化 */
        .thumb-item {
            cursor: pointer;
            border: 2px solid #EADBC8;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: white;
            padding: 4px;
            text-align: center;
            position: relative;
        }

        .thumb-item:hover {
            border-color: #DAC0A3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(140, 106, 93, 0.15);
        }

        .thumb-item.active {
            border-color: #8C6A5D;
            background-color: #FFF9F2;
            box-shadow: 0 4px 15px rgba(140, 106, 93, 0.2);
            z-index: 1;
        }

        .thumb-placeholder {
            aspect-ratio: 1 / 1.4;
            background-color: #F8F0E5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #DAC0A3;
            font-size: 20px;
        }

        .thumb-canvas {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }

        /* 隱藏捲軸並美化 (Scrollbar) */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #F8F0E5;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #DAC0A3;
            border-radius: 10px;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .floating-bunny {
            animation: float 3s ease-in-out infinite;
        }

        /* 進度條樣式 */
        .progress-container {
            width: 100%;
            height: 12px;
            background-color: #EADBC8;
            border-radius: 10px;
            border: 2px solid #DAC0A3;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #8C6A5D, #DAC0A3);
            width: 0%;
            transition: width 0.3s ease;
        }

        .fun-fact-box {
            background-color: #F8F0E5;
            border-left: 5px solid #DAC0A3;
            padding: 10px 20px;
            margin-top: 20px;
            border-radius: 10px;
            max-width: 300px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="cute-card w-full max-w-6xl h-[85vh] flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- 載入中動畫 (Loading Animation) - 現在覆蓋全屏 -->
        <div id="loading"
            class="absolute inset-0 bg-[#F8F0E5] z-[100] flex flex-col items-center justify-center p-8 text-center transition-opacity duration-500">
            <div class="text-8xl floating-bunny mb-6">🐰</div>
            <div class="text-3xl font-black text-[#8C6A5D] mb-4">書本正在搬運中...</div>
            
            <!-- 進度條 -->
            <div class="w-64">
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div id="loading-status" class="text-sm font-bold text-[#8C6A5D] mt-2">準備出發！</div>
            </div>

            <!-- 趣味小語 -->
            <div class="fun-fact-box">
                <div class="text-[10px] text-[#DAC0A3] font-bold uppercase tracking-wider mb-1">你知道嗎？</div>
                <div id="loading-tip" class="text-xs font-bold text-[#8C6A5D]">正在準備讀書會...</div>
            </div>
        </div>

        <!-- 左側：多功能側欄 -->
        <div id="sidebar"
            class="w-full md:w-1/4 bg-[#FAF6F0] p-4 border-b md:border-b-0 md:border-r-4 border-[#DAC0A3] flex flex-col z-30">
            
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-xl font-black text-[#8C6A5D] flex items-center gap-2">
                    <span id="sidebar-icon" class="text-2xl">📚</span> <span id="sidebar-title">我的書櫃</span>
                </h1>
                <button id="view-mode-toggle" class="text-[10px] bg-[#DAC0A3] text-white px-3 py-1.5 rounded-full font-black hover:bg-[#8C6A5D] transition-colors uppercase tracking-widest shadow-sm">切換模式</button>
            </div>

            <!-- 內容容器 -->
            <div class="flex-1 overflow-hidden flex flex-col">
                <!-- 書櫃模式 -->
                <div id="book-list" class="flex-1 overflow-y-auto space-y-3 pr-1">
                    <!-- 由 JavaScript 動態產生 -->
                </div>

                <!-- 縮圖模式 (預設隱藏) -->
                <div id="thumbnail-list" class="hidden flex-1 overflow-y-auto grid grid-cols-2 gap-4 p-1">
                    <!-- 由 JavaScript 動態產生 -->
                </div>
            </div>

            <div
                class="mt-4 text-[10px] text-[#8C6A5D] opacity-70 font-bold text-center bg-[#EADBC8]/30 p-3 rounded-2xl border border-[#DAC0A3]/50">
                ✨ 提示：縮圖模式下可快速翻閱頁面
            </div>
        </div>

        <!-- 右側：閱讀區 -->
        <div class="flex-1 p-4 md:p-6 flex flex-col bg-white relative">
            
            <!-- 控制面板 (Chrome-style Toolbar) -->
            <div
                class="flex flex-wrap items-center gap-2 mb-4 bg-[#F8F0E5] p-2 rounded-2xl border-2 border-[#DAC0A3] sticky top-0 z-10 shadow-sm">
                
                <!-- 標題與側欄開關 -->
                <div class="flex items-center gap-2 flex-1">
                    <button id="toggle-sidebar" class="cute-btn px-2 h-8 text-xs" title="切換書櫃/縮圖">📑</button>
                    <h2 id="current-title" class="text-md font-bold text-[#8C6A5D] truncate hidden md:block">歡迎光臨！</h2>
                </div>
                
                <!-- 縮放與旋轉控制 -->
                <div class="flex items-center gap-1 border-r-2 border-[#DAC0A3]/30 pr-2">
                    <button id="zoom-out" class="cute-btn w-8 h-8 flex items-center justify-center" title="縮小">－</button>
                    <span id="zoom-percent" class="text-xs font-bold text-[#8C6A5D] w-12 text-center">100%</span>
                    <button id="zoom-in" class="cute-btn w-8 h-8 flex items-center justify-center" title="放大">＋</button>
                    <button id="fit-page" class="cute-btn px-2 h-8 text-xs ml-1" title="符合分頁">📄</button>
                    <button id="rotate-pdf" class="cute-btn w-8 h-8 flex items-center justify-center text-xs ml-1" title="旋轉">🔄</button>
                </div>

                <!-- 頁碼切換 -->
                <div class="flex items-center gap-1 pr-2">
                    <button id="prev-page" class="cute-btn w-8 h-8 flex items-center justify-center">＜</button>
                    <div class="flex items-center bg-white rounded-lg px-2 border border-[#DAC0A3]">
                        <input type="number" id="page-input" value="0" class="w-10 text-center text-sm font-bold text-[#8C6A5D] outline-none" min="1">
                        <span class="text-[#8C6A5D] font-bold text-xs mx-1">/</span>
                        <span id="page-count" class="text-[#8C6A5D] font-bold text-xs">0</span>
                    </div>
                    <button id="next-page" class="cute-btn w-8 h-8 flex items-center justify-center">＞</button>
                </div>

                <!-- 其他功能 -->
                <div class="flex items-center gap-1">
                    <button id="download-pdf" class="cute-btn w-8 h-8 flex items-center justify-center text-sm" title="下載">⬇</button>
                    <button id="print-pdf" class="cute-btn w-8 h-8 flex items-center justify-center text-sm" title="列印">🖨️</button>
                </div>
            </div>

            <!-- 顯示 PDF 的掛載點 (Containment) -->
            <div id="pdf-viewer-container"
                class="flex-1 overflow-auto bg-[#FAF6F0] rounded-2xl border-4 border-[#DAC0A3] flex items-start justify-center p-2 md:p-4">
                <canvas id="pdf-canvas" class="shadow-xl rounded-lg bg-white"></canvas>
            </div>

        </div>
    </div>

    <script>
        // 設定 PDF.js 的幫手 (Worker)
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        }

        // 使用「相對路徑 (Relative Path)」，因為檔案和網頁在同一個倉庫
        const PDF_FILES = [
            { id: 1, title: '🏠 心動小鎮 (Heartopia)', filename: 'Heartopia.pdf' }
        ];

        let pdfDoc = null,
            pageNum = 1,
            scale = 1.0,
            rotation = 0,
            pageIsRendering = false,
            pageNumIsPending = null,
            currentFilename = '';

        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const viewerContainer = document.getElementById('pdf-viewer-container');
        const sidebar = document.getElementById('sidebar');
        const bookList = document.getElementById('book-list');
        const thumbnailList = document.getElementById('thumbnail-list');
        const sidebarTitle = document.getElementById('sidebar-title');
        const sidebarIcon = document.getElementById('sidebar-icon');
        const loadingScreen = document.getElementById('loading');
        const loadingStatus = document.getElementById('loading-status');
        const progressBar = document.getElementById('progress-bar');
        const loadingTip = document.getElementById('loading-tip');
        const pageInput = document.getElementById('page-input');
        const zoomPercent = document.getElementById('zoom-percent');

        const LOADING_MESSAGES = [
            "搬運工人小兔正在努力爬樓梯 (這本 82MB 真的好重！)",
            "正在清掃書房裡的灰塵... 阿啾！🤧",
            "正在幫這本書貼上漂亮的蕾絲標籤...",
            "圖書管理員正在找這本書的鑰匙...",
            "等等，我先喝一口胡蘿蔔汁再繼續搬... 🥕",
            "這本書裡面好像有藏寶圖？(盯... 🧐)",
            "正在調整最舒心的閱讀光線...",
            "搬運進度很好，小兔體力還很充沛！💪"
        ];
        let messageInterval = null;

        function renderBookList() {
            const listContainer = document.getElementById('book-list');
            listContainer.innerHTML = '';

            PDF_FILES.forEach(file => {
                const btn = document.createElement('div');
                btn.className = 'book-item p-4 text-[#8C6A5D] font-bold text-lg';
                btn.innerHTML = file.title;
                btn.onclick = () => {
                    document.querySelectorAll('.book-item').forEach(el => el.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('current-title').innerText = file.title;
                    loadPDF(file.filename);
                };
                listContainer.appendChild(btn);
            });
        }

        // 核心載入邏輯 (Load Logic)
        async function loadPDF(filename) {
            showLoading(true);
            startMessageCycle();
            progressBar.style.width = '0%';
            loadingStatus.innerText = "正在聯絡搬運工人...";

            try {
                // 直接讀取同資料夾檔案
                const loadingTask = pdfjsLib.getDocument(filename);

                // 更新搬運百分比
                loadingTask.onProgress = function (progress) {
                    if (progress.total > 0) {
                        const percent = Math.round((progress.loaded / progress.total) * 100);
                        progressBar.style.width = `${percent}%`;
                        loadingStatus.innerText = `已搬運：${percent}% (${(progress.loaded / 1024 / 1024).toFixed(1)} / ${(progress.total / 1024 / 1024).toFixed(1)} MB)`;
                    }
                };

                pdfDoc = await loadingTask.promise;
                currentFilename = filename;
                document.getElementById('page-count').textContent = pdfDoc.numPages;
                pageInput.max = pdfDoc.numPages;
                
                // 首次載入自動適應頁面
                pageNum = 1;
                await autoFitPage();
                renderPage(pageNum);

                // 同步生成縮圖 (不使用 await 避免阻塞主頁面)
                renderThumbnails();

            } catch (err) {
                console.error("載入失敗:", err);
                loadingStatus.innerText = "找不到書本 😭";
                const errorBox = document.createElement('div');
                errorBox.className = "bg-red-50 p-4 text-red-600 rounded-xl text-center font-bold";
                errorBox.innerText = "錯誤：檔案庫中似乎找不到 Heartopia.pdf！";
                canvas.parentElement.appendChild(errorBox);
                showLoading(false);
            }
        }

        // 畫出 PDF 頁面
        function renderPage(num) {
            if (!pdfDoc) return;
            pageIsRendering = true;
            
            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale: scale, rotation: rotation });
                
                // 為了高畫質渲染 (Retina 支援)
                const outputScale = window.devicePixelRatio || 1;
                canvas.width = Math.floor(viewport.width * outputScale);
                canvas.height = Math.floor(viewport.height * outputScale);
                canvas.style.width = Math.floor(viewport.width) + "px";
                canvas.style.height = Math.floor(viewport.height) + "px";

                const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;

                const renderCtx = { 
                    canvasContext: ctx, 
                    viewport: viewport,
                    transform: transform
                };
                
                page.render(renderCtx).promise.then(() => {
                    pageIsRendering = false;
                    showLoading(false);
                    if (pageNumIsPending !== null) {
                        renderPage(pageNumIsPending);
                        pageNumIsPending = null;
                    }
                });

                // 更新 UI
                pageInput.value = num;
                zoomPercent.innerText = Math.round(scale * 100) + '%';

                // 更新縮圖選中狀態
                document.querySelectorAll('.thumb-item').forEach(el => el.classList.remove('active'));
                const activeThumb = document.querySelector(`.thumb-item[data-page="${num}"]`);
                if (activeThumb) activeThumb.classList.add('active');
            });
        }

        async function renderThumbnails() {
            thumbnailList.innerHTML = '';
            const total = pdfDoc.numPages;
            
            // 建立所有佔位符
            const items = [];
            for (let i = 1; i <= total; i++) {
                const thumbItem = document.createElement('div');
                thumbItem.className = 'thumb-item' + (i === pageNum ? ' active' : '');
                thumbItem.setAttribute('data-page', i);
                thumbItem.innerHTML = `
                    <div class="thumb-placeholder" id="thumb-p-${i}">⏳</div>
                    <div class="text-[10px] font-black text-[#8C6A5D] mt-1.5 px-1">${i}</div>
                `;
                thumbItem.onclick = () => {
                    pageNum = i;
                    queueRenderPage(i);
                };
                thumbnailList.appendChild(thumbItem);
                items.push(thumbItem);
            }

            // 非同步渲染，每幀渲染一個，不阻塞 UI
            for (let i = 1; i <= total; i++) {
                // 等待微小時間讓出主執行緒
                await new Promise(r => requestAnimationFrame(r));
                
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 0.25 });
                
                const thumbCanvas = document.createElement('canvas');
                thumbCanvas.className = 'thumb-canvas';
                const tCtx = thumbCanvas.getContext('2d');
                thumbCanvas.height = viewport.height;
                thumbCanvas.width = viewport.width;

                const renderCtx = { canvasContext: tCtx, viewport: viewport };
                await page.render(renderCtx).promise;

                // 替換佔位符
                const placeholder = document.getElementById(`thumb-p-${i}`);
                if (placeholder) {
                    placeholder.replaceWith(thumbCanvas);
                }
            }
        }

        async function autoFitPage() {
            if (!pdfDoc) return;
            const page = await pdfDoc.getPage(pageNum);
            const containerWidth = viewerContainer.clientWidth - 40; 
            const containerHeight = viewerContainer.clientHeight - 40;
            const viewport = page.getViewport({ scale: 1.0, rotation: rotation });
            
            const widthScale = containerWidth / viewport.width;
            const heightScale = containerHeight / viewport.height;
            
            // 同時符合寬度跟高度：取兩者中最小的比例
            scale = Math.min(widthScale, heightScale);
            
            if (scale > 3) scale = 3;
            if (scale < 0.2) scale = 0.2;
        }

        // 換頁排隊機制 (Queue)
        function queueRenderPage(num) {
            if (pageIsRendering) { pageNumIsPending = num; }
            else { renderPage(num); }
        }

        document.getElementById('prev-page').onclick = () => {
            if (pageNum <= 1 || !pdfDoc) return;
            pageNum--;
            queueRenderPage(pageNum);
        };

        document.getElementById('next-page').onclick = () => {
            if (!pdfDoc || pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        };

        // 縮放按鈕邏輯
        document.getElementById('zoom-in').onclick = () => {
            scale += 0.25;
            queueRenderPage(pageNum);
        };

        document.getElementById('zoom-out').onclick = () => {
            if (scale <= 0.25) return;
            scale -= 0.25;
            queueRenderPage(pageNum);
        };

        document.getElementById('fit-page').onclick = async () => {
            await autoFitPage();
            queueRenderPage(pageNum);
        };

        document.getElementById('rotate-pdf').onclick = () => {
            rotation = (rotation + 90) % 360;
            queueRenderPage(pageNum);
        };

        document.getElementById('toggle-sidebar').onclick = () => {
            sidebar.classList.toggle('collapsed');
        };

        document.getElementById('view-mode-toggle').onclick = () => {
            const isBookMode = !bookList.classList.contains('hidden');
            if (isBookMode) {
                bookList.classList.add('hidden');
                thumbnailList.classList.remove('hidden');
                sidebarTitle.innerText = "頁面預覽";
                sidebarIcon.innerText = "🖼️";
            } else {
                bookList.classList.remove('hidden');
                thumbnailList.classList.add('hidden');
                sidebarTitle.innerText = "我的書櫃";
                sidebarIcon.innerText = "📚";
            }
        };

        // 跳頁邏輯
        pageInput.onchange = (e) => {
            const newPage = parseInt(e.target.value);
            if (newPage >= 1 && newPage <= pdfDoc.numPages) {
                pageNum = newPage;
                queueRenderPage(pageNum);
            } else {
                e.target.value = pageNum;
            }
        };

        // 下載與列印
        document.getElementById('download-pdf').onclick = () => {
            if (!currentFilename) return;
            const link = document.createElement('a');
            link.href = currentFilename;
            link.download = currentFilename;
            link.click();
        };

        document.getElementById('print-pdf').onclick = () => {
            if (!currentFilename) return;
            const printWindow = window.open(currentFilename, '_blank');
            printWindow.print();
        };

        // 監聽視窗大小改變，自動調整 (選用)
        window.onresize = () => {
            if (pdfDoc) {
                // 不一定要自動調整，因為使用者可能手動縮放了
                // 但可以提供一個更好的初始體驗
            }
        };

        // 鍵盤快速鍵
        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                document.getElementById('next-page').click();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                document.getElementById('prev-page').click();
            }
        });

        function showLoading(show) {
            if (show) {
                loadingScreen.style.display = 'flex';
                loadingScreen.style.opacity = '1';
                startMessageCycle();
            } else {
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    stopMessageCycle();
                }, 500);
            }
        }

        function startMessageCycle() {
            let i = 0;
            loadingTip.innerText = LOADING_MESSAGES[0];
            messageInterval = setInterval(() => {
                i = (i + 1) % LOADING_MESSAGES.length;
                loadingTip.classList.remove('fadeIn');
                void loadingTip.offsetWidth; // 觸發重繪
                loadingTip.innerText = LOADING_MESSAGES[i];
            }, 3000);
        }

        function stopMessageCycle() {
            if (messageInterval) clearInterval(messageInterval);
        }

        // 初始化
        renderBookList();
        
        // 🚀 自動載入預設書籍
        window.addEventListener('DOMContentLoaded', () => {
            const defaultBook = PDF_FILES[0];
            document.getElementById('current-title').innerText = defaultBook.title;
            // 標註 active 狀態
            setTimeout(() => {
                const firstItem = document.querySelector('.book-item');
                if (firstItem) firstItem.classList.add('active');
            }, 100);
            loadPDF(defaultBook.filename);
        });
    </script>
</body>

</html>
