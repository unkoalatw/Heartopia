<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心動小鎮書房</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="theme-color" content="#DAC0A3">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link rel="stylesheet" href="./css/output.css">
</head>
<body class="min-h-screen flex items-center justify-center p-2 md:p-8">

    <div class="cute-card w-full max-w-6xl h-[90vh] md:h-[85vh] flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Loading Screen -->
        <div id="loading" class="absolute inset-0 bg-[#F8F0E5] z-[100] flex flex-col items-center justify-center p-8 text-center transition-opacity duration-500">
            <div class="mb-6 w-full max-w-xs md:max-w-sm px-4 drop-shadow-2xl">
                <svg width="100%" height="auto" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" class="rounded-xl overflow-hidden">
                    <style>@keyframes road-move{0%{transform:translateX(0)}100%{transform:translateX(-500px)}}@keyframes wheel-rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes car-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}@keyframes tree-move{0%{transform:translateX(1000px)}100%{transform:translateX(-100px)}}</style>
                    <defs><linearGradient id="sky-gradient" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" /><stop offset="100%" style="stop-color:#e0f7fa;stop-opacity:1" /></linearGradient><linearGradient id="road-gradient" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#333;stop-opacity:1" /><stop offset="100%" style="stop-color:#555;stop-opacity:1" /></linearGradient><linearGradient id="car-body-gradient" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" /><stop offset="100%" style="stop-color:#007aff;stop-opacity:1" /></linearGradient></defs>
                    <rect width="1000" height="300" fill="url(#sky-gradient)" />
                    <rect y="300" width="1000" height="200" fill="#7cfc00" />
                    <g style="animation: road-move 2s linear infinite;"><rect x="0" y="300" width="1500" height="150" fill="url(#road-gradient)" /><rect x="0" y="360" width="1500" height="10" fill="white" /><g stroke="white" stroke-width="6" stroke-dasharray="50, 100"><line x1="0" y1="375" x2="1500" y2="375" /></g></g>
                    <g style="animation: tree-move 5s linear infinite;"><circle cx="20" cy="270" r="30" fill="#228B22"/><rect x="15" y="290" width="10" height="50" fill="#8B4513"/></g>
                    <g style="animation: tree-move 5s linear infinite; animation-delay: -2s;"><circle cx="20" cy="270" r="25" fill="#228B22"/><rect x="15" y="290" width="8" height="40" fill="#8B4513"/></g>
                    <g style="animation: car-bob 0.5s ease-in-out infinite;">
                        <path d="M100 320 L150 280 L280 280 L350 320 L350 380 L100 380 Z" fill="url(#car-body-gradient)" />
                        <path d="M160 285 L270 285 L260 315 L170 315 Z" fill="#b3e5fc" stroke="#4a90e2" stroke-width="2" />
                        <path d="M280 285 L320 315 L280 315 Z" fill="#b3e5fc" stroke="#4a90e2" stroke-width="2" />
                        <g style="transform-origin: 150px 380px; animation: wheel-rotate 1s linear infinite;"><circle cx="150" cy="380" r="25" fill="#222" /><circle cx="150" cy="380" r="15" fill="#eee" stroke="#666" stroke-width="3" /><rect x="147" y="365" width="6" height="30" fill="#666" /><rect x="135" y="377" width="30" height="6" fill="#666" /></g>
                        <g style="transform-origin: 300px 380px; animation: wheel-rotate 1s linear infinite;"><circle cx="300" cy="380" r="25" fill="#222" /><circle cx="300" cy="380" r="15" fill="#eee" stroke="#666" stroke-width="3" /><rect x="297" y="365" width="6" height="30" fill="#666" /><rect x="285" y="377" width="30" height="6" fill="#666" /></g>
                        <circle cx="110" cy="335" r="5" fill="#fff9c4" /><path d="M110 335 L80 330 L80 340 Z" fill="#fff9c4" opacity="0.6"/>
                        <rect x="340" y="330" width="10" height="20" rx="3" fill="#ff5252" />
                        <text x="225" y="360" font-family="Verdana" font-size="20" fill="white" text-anchor="middle">GO!</text>
                    </g>
                </svg>
            </div>
            <div class="text-2xl md:text-3xl font-black text-[#8C6A5D] mb-4">專車正在趕路中...</div>
            <div class="w-64">
                <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
                <div id="loading-status" class="text-sm font-bold text-[#8C6A5D] mt-2">引擎發動中！</div>
            </div>
            <div class="fun-fact-box">
                <div class="text-[10px] text-[#DAC0A3] font-bold uppercase tracking-wider mb-1">你知道嗎？</div>
                <div id="loading-tip" class="text-xs font-bold text-[#8C6A5D]">正在準備讀書會...</div>
            </div>
        </div>

        <!-- Sidebar -->
        <div id="sidebar" class="w-full md:w-1/4 bg-[#FAF6F0] p-4 border-b md:border-b-0 md:border-r-4 border-[#DAC0A3] flex flex-col z-30">
            <div class="flex items-center justify-between mb-4">
                <h1 class="text-xl font-black text-[#8C6A5D] flex items-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    <span id="sidebar-title">我的區塊</span>
                </h1>
                <button id="settings-btn" class="cute-btn w-8 h-8 flex items-center justify-center border-2 border-[#DAC0A3] text-[#8C6A5D] bg-white rounded-full">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
            </div>
            
            <!-- Tabs -->
            <div class="flex items-center gap-1 mb-4 bg-[#EADBC8] p-1 rounded-xl">
               <button id="tab-books" class="flex-1 py-1.5 text-xs font-bold rounded-lg bg-white text-[#8C6A5D] transition-colors">書櫃</button>
               <button id="tab-thumbs" class="flex-1 py-1.5 text-xs font-bold rounded-lg text-[#DAC0A3] transition-colors">縮圖</button>
               <button id="tab-toc" class="flex-1 py-1.5 text-xs font-bold rounded-lg text-[#DAC0A3] transition-colors">目錄</button>
               <button id="tab-notes" class="flex-1 py-1.5 text-xs font-bold rounded-lg text-[#DAC0A3] transition-colors">筆記</button>
            </div>

            <div class="flex-1 overflow-hidden flex flex-col">
                <div id="book-list" class="flex-1 overflow-y-auto space-y-3 pr-1"></div>
                <div id="thumbnail-list" class="hidden flex-1 overflow-y-auto grid grid-cols-2 gap-4 p-1"></div>
                
                <div id="toc-view" class="hidden flex-1 flex-col h-full">
                    <div class="px-2 pb-2">
                        <div class="relative">
                            <input type="text" id="toc-search" placeholder="搜尋標題..." class="w-full py-1.5 pl-8 pr-2 rounded-lg border-2 border-[#EADBC8] outline-none text-[#8C6A5D] text-sm bg-white focus:border-[#DAC0A3] transition-colors">
                            <svg class="w-4 h-4 text-[#DAC0A3] absolute left-2.5 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                    </div>
                    <div id="toc-list" class="flex-1 overflow-y-auto px-1"></div>
                </div>

                <div id="notes-view" class="hidden flex-1 flex-col h-full relative group">
                    <textarea id="note-textarea" class="flex-1 w-full p-3 rounded-xl border-2 border-[#EADBC8] outline-none text-[#8C6A5D] text-sm resize-none" placeholder="在此輸入筆記... 會自動儲存至本地快取。"></textarea>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-2 md:p-4 flex flex-col bg-white relative min-w-0">
            <!-- Toolbar -->
            <div class="flex flex-wrap items-center gap-2 mb-4 bg-[#F8F0E5] p-2 rounded-2xl border-2 border-[#DAC0A3] sticky top-0 z-10 shadow-sm auto-cols-auto">
                <div class="flex items-center gap-2">
                    <button id="toggle-sidebar" class="cute-btn w-8 h-8 flex items-center justify-center" title="展開/收摺側欄">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <h2 id="current-title" class="text-md font-bold text-[#8C6A5D] truncate hidden lg:block max-w-[150px]">歡迎光臨！</h2>
                </div>
                <div class="flex-1"></div>
                
                <div class="flex items-center gap-1 border-r-2 border-[#DAC0A3]/30 pr-2">
                    <button id="zoom-out" class="cute-btn w-8 h-8 flex items-center justify-center" title="縮小">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"></path></svg>
                    </button>
                    <span id="zoom-percent" class="text-xs font-bold text-[#8C6A5D] w-10 text-center">100%</span>
                    <button id="zoom-in" class="cute-btn w-8 h-8 flex items-center justify-center" title="放大">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                    </button>
                    <button id="fit-page" class="cute-btn w-8 h-8 flex items-center justify-center ml-1" title="符合螢幕">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                    </button>
                    <button id="rotate-pdf" class="cute-btn w-8 h-8 flex items-center justify-center ml-1" title="旋轉">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>

                <div class="flex items-center gap-1 pr-2">
                    <button id="prev-page" class="cute-btn w-8 h-8 flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <div class="flex items-center bg-white rounded-lg px-2 py-0.5 border border-[#DAC0A3]">
                        <input type="number" id="page-input" value="0" class="w-8 text-center text-sm font-bold text-[#8C6A5D] outline-none" min="1">
                        <span class="text-[#8C6A5D] font-bold text-xs mx-1">/</span>
                        <span id="page-count" class="text-[#8C6A5D] font-bold text-xs">0</span>
                    </div>
                    <button id="next-page" class="cute-btn w-8 h-8 flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>

                <div class="flex items-center gap-1">
                    <button id="download-pdf" class="cute-btn w-8 h-8 hidden md:flex items-center justify-center" title="下載">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    </button>
                    <button id="print-pdf" class="cute-btn w-8 h-8 hidden md:flex items-center justify-center" title="列印">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    </button>
                    <button id="toggle-fullscreen" class="cute-btn w-8 h-8 flex items-center justify-center" title="全螢幕">
                        <svg id="fs-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                    </button>
                </div>
            </div>

            <!-- PDF Continuous Scroll Container -->
            <div id="pdf-viewer-container" class="flex-1 overflow-auto bg-[#FAF6F0] rounded-2xl border-4 border-[#DAC0A3] flex flex-col items-center gap-6 p-4 scroll-smooth">
                <!-- Canvases -->
            </div>

            <!-- Scrub Bar -->
            <div id="scrub-bar-container" class="hidden absolute bottom-0 left-4 right-4 h-3 bg-[#EADBC8] rounded-t-lg cursor-pointer transition-all hover:h-4 group z-20 overflow-visible">
                <div id="scrub-bar-progress" class="h-full bg-[#8C6A5D] rounded-t-lg transition-all" style="width:0%"></div>
                <div id="scrub-preview" class="absolute bottom-6 left-0 hidden transform -translate-x-1/2 p-2 bg-white rounded-xl shadow-[0_10px_25px_rgba(0,0,0,0.15)] border border-[#DAC0A3] pointer-events-none text-center">
                    <canvas id="scrub-preview-canvas" width="100" height="140" class="block mx-auto bg-gray-100 rounded-md"></canvas>
                    <div id="scrub-preview-text" class="text-xs font-black text-[#8C6A5D] mt-2"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-[#8C6A5D]/40 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 md:p-8 w-full max-w-sm shadow-2xl border-4 border-[#DAC0A3]">
            <h2 class="text-xl font-black text-[#8C6A5D] mb-6 flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> 系統設定
            </h2>
            <div class="space-y-4">
                <label class="flex items-center justify-between cursor-pointer">
                    <span class="text-[#8C6A5D] font-bold text-sm">自動記錄最後閱讀頁碼</span>
                    <input type="checkbox" id="setting-remember" class="w-5 h-5 accent-[#8C6A5D]">
                </label>
                <label class="flex items-center justify-between cursor-pointer">
                    <span class="text-[#8C6A5D] font-bold text-sm">顯示極速跳頁導覽列 (底部)</span>
                    <input type="checkbox" id="setting-scrub" class="w-5 h-5 accent-[#8C6A5D]">
                </label>
                <label class="flex items-center justify-between cursor-pointer">
                    <span class="text-[#8C6A5D] font-bold text-sm">開啟動態按需載入 (防當機)</span>
                    <input type="checkbox" id="setting-lazy" class="w-5 h-5 accent-[#8C6A5D]">
                </label>
            </div>
            <button id="close-settings" class="mt-8 w-full cute-btn py-2 text-sm">儲存並返回</button>
        </div>
    </div>

    <!-- Refactored Scripts -->
    <script src="./js/store.js"></script>
    <script src="./js/pdfLoader.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
