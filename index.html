<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心動小鎮書房</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #F8F0E5; 
            background-image: radial-gradient(#EADBC8 2px, transparent 2px);
            background-size: 30px 30px;
        }

        .cute-card {
            background-color: #FFFFFF;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(218, 192, 163, 0.5);
            border: 4px solid #DAC0A3;
        }

        .cute-btn {
            background-color: #EADBC8;
            color: #8C6A5D;
            border: 3px solid #DAC0A3;
            border-radius: 20px;
            font-weight: 900;
            transition: all 0.2s ease;
        }

        .cute-btn:hover {
            background-color: #DAC0A3;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(140, 106, 93, 0.3);
        }

        .book-item {
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .book-item:hover {
            background-color: #F8F0E5;
            border-radius: 15px;
            transform: translateX(5px);
        }

        .book-item.active {
            background-color: #DAC0A3;
            color: white;
            border-radius: 15px;
            border: 2px solid #8C6A5D;
        }

        /* 自定義捲軸 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #F8F0E5; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #DAC0A3; border-radius: 10px; }

        /* 動畫效果 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating-bunny { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="cute-card w-full max-w-6xl h-[85vh] flex flex-col md:flex-row overflow-hidden">
        
        <!-- 左側：書櫃 -->
        <div class="w-full md:w-1/4 bg-[#FAF6F0] p-6 border-b md:border-b-0 md:border-r-4 border-[#DAC0A3] flex flex-col">
            <h1 class="text-2xl font-black text-[#8C6A5D] mb-6 flex items-center gap-2">
                <span>🧸</span> 我的小書櫃
            </h1>
            
            <div id="book-list" class="flex-1 overflow-y-auto space-y-2">
                <!-- 由 JavaScript 產生 -->
            </div>
            
            <div class="mt-4 text-xs text-[#8C6A5D] font-bold text-center bg-[#EADBC8] p-3 rounded-2xl border-2 border-[#DAC0A3]">
                提示：檔案較大時，請耐心等候搬運工人喔！✨
            </div>
        </div>

        <!-- 右側：閱讀區 -->
        <div class="w-full md:w-3/4 p-4 md:p-6 flex flex-col bg-white relative">
            
            <!-- 載入中遮罩 -->
            <div id="loading" class="hidden absolute inset-0 bg-white/90 z-20 flex flex-col items-center justify-center rounded-3xl">
                <div class="text-6xl floating-bunny mb-4">🐰</div>
                <div class="text-xl font-bold text-[#8C6A5D]">正在努力搬運厚重的書本...</div>
                <div id="loading-status" class="text-sm font-bold text-[#DAC0A3] mt-2">請稍候 (這本書有 78MB 喔！)</div>
            </div>

            <!-- 控制面板 -->
            <div class="flex flex-wrap justify-between items-center gap-3 mb-4 bg-[#F8F0E5] p-3 rounded-2xl border-2 border-[#DAC0A3]">
                <h2 id="current-title" class="text-lg font-bold text-[#8C6A5D] truncate flex-1">歡迎來到小鎮書房！</h2>
                <div class="flex items-center gap-2">
                    <button id="prev-page" class="cute-btn px-3 py-1 text-sm md:text-base">上頁</button>
                    <span class="text-[#8C6A5D] font-bold text-sm">
                        <span id="page-num">0</span> / <span id="page-count">0</span>
                    </span>
                    <button id="next-page" class="cute-btn px-3 py-1 text-sm md:text-base">下頁</button>
                </div>
            </div>

            <!-- PDF 內容區 -->
            <div class="flex-1 overflow-auto bg-[#FAF6F0] rounded-2xl border-4 border-[#DAC0A3] flex items-start justify-center p-2 md:p-4">
                <canvas id="pdf-canvas" class="max-w-full shadow-md rounded-lg"></canvas>
            </div>
            
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const GITHUB_CONFIG = {
            owner: 'unkoalatw', 
            repo: 'Heartopia',  
            tag: 'v.1'          
        };

        const PDF_FILES = [
            { id: 1, title: '🏠 心動小鎮 (Heartopia)', filename: 'Heartopia.pdf' }
        ];

        let pdfDoc = null,
            pageNum = 1,
            pageIsRendering = false,
            pageNumIsPending = null;

        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const loadingScreen = document.getElementById('loading');
        const loadingStatus = document.getElementById('loading-status');

        function renderBookList() {
            const listContainer = document.getElementById('book-list');
            listContainer.innerHTML = ''; // 確保清空

            PDF_FILES.forEach(file => {
                const btn = document.createElement('div');
                btn.className = 'book-item p-4 text-[#8C6A5D] font-bold text-lg';
                btn.innerHTML = file.title;
                btn.onclick = () => {
                    document.querySelectorAll('.book-item').forEach(el => el.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('current-title').innerText = file.title;
                    loadPDF(file.filename);
                };
                listContainer.appendChild(btn);
            });
        }

        // 🌟 終極解法：使用 GitHub 官方 API 直連，徹底拋棄不穩定的第三方代理！
        async function loadPDF(filename) {
            showLoading(true);
            loadingStatus.innerText = "正在向 GitHub 總部查詢檔案位置...";

            try {
                // 第一步：透過 API 取得 Release 資訊
                const releaseUrl = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/releases/tags/${GITHUB_CONFIG.tag}`;
                const releaseRes = await fetch(releaseUrl);
                
                if (!releaseRes.ok) {
                    throw new Error("找不到 Release 標籤，請確認 Tag 名稱是否正確。");
                }
                
                const releaseData = await releaseRes.json();

                // 第二步：在 Release 裡找到我們要的檔案 (Heartopia.pdf)
                const asset = releaseData.assets.find(a => a.name === filename);
                if (!asset) {
                    throw new Error(`在 Release 中找不到名為 ${filename} 的檔案！`);
                }

                // 第三步：利用 API 給的真實網址直接下載
                // 加上 Accept: application/octet-stream 標頭，GitHub 就會直接把檔案本體傳給我們
                loadingStatus.innerText = "取得直達門票！正在努力下載 78MB 的書本中...";
                const assetUrl = asset.url; 
                
                const assetRes = await fetch(assetUrl, {
                    headers: {
                        'Accept': 'application/octet-stream'
                    }
                });

                if (!assetRes.ok) throw new Error(`下載失敗，狀態碼：${assetRes.status}`);

                // 把下載回來的檔案轉成數據塊 (Blob)
                const blob = await assetRes.blob();
                const arrayBuffer = await blob.arrayBuffer();

                // 第四步：交給 PDF.js 渲染
                loadingStatus.innerText = "下載完成！正在為您整理畫面...";
                const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
                pdfDoc = await loadingTask.promise;
                
                document.getElementById('page-count').textContent = pdfDoc.numPages;
                pageNum = 1;
                renderPage(pageNum);

            } catch (err) {
                console.error("PDF 載入失敗:", err);
                loadingStatus.innerText = "搬運失敗了 😭";
                alert("糟糕！搬運過程出錯：\n" + err.message + "\n\n這次我們是直連 GitHub，如果還是失敗，請確認您的網路連線喔！");
                showLoading(false);
            }
        }

        function renderPage(num) {
            pageIsRendering = true;
            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale: 1.5 });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderCtx = { canvasContext: ctx, viewport: viewport };
                page.render(renderCtx).promise.then(() => {
                    pageIsRendering = false;
                    showLoading(false);
                    if (pageNumIsPending !== null) {
                        renderPage(pageNumIsPending);
                        pageNumIsPending = null;
                    }
                });
                document.getElementById('page-num').textContent = num;
            });
        }

        function queueRenderPage(num) {
            if (pageIsRendering) { pageNumIsPending = num; } 
            else { renderPage(num); }
        }

        document.getElementById('prev-page').addEventListener('click', () => {
            if (pageNum <= 1 || !pdfDoc) return;
            pageNum--;
            queueRenderPage(pageNum);
        });

        document.getElementById('next-page').addEventListener('click', () => {
            if (!pdfDoc || pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        });

        function showLoading(show) {
            loadingScreen.style.display = show ? 'flex' : 'none';
        }

        renderBookList();
    </script>
</body>
</html>
